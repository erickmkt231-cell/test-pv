<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B1220">
<title>AquaGest · ERP de Piscicultura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#F7F8FA; --surface:#FFFFFF; --surface2:#F1F3F6; --border:#E6E8EE;
  --text:#0F172A; --text2:#5B6472; --text3:#94A0B0;
  --primary:#0E7490; --primary-strong:#0C5F76; --primary-soft:#E0F2F7;
  --accent:#0EA5A4; --green:#0E9F6E; --green-soft:#E5F7F0; --red:#E02D3C; --red-soft:#FDEBED;
  --amber:#D97706; --amber-soft:#FEF3E2; --violet:#7C3AED; --violet-soft:#F1EAFD;
  --shadow:0 1px 2px rgba(15,23,42,.05),0 4px 16px rgba(15,23,42,.06);
  --shadow-lg:0 8px 40px rgba(15,23,42,.14);
  --r:14px; --r-sm:10px;
}
[data-theme="dark"]{
  --bg:#0B1220; --surface:#111A2C; --surface2:#18233A; --border:#22304B;
  --text:#EDF1F7; --text2:#9AA7BC; --text3:#61708A;
  --primary:#22B8CF; --primary-strong:#4CC9DD; --primary-soft:#11303E;
  --accent:#2DD4BF; --green:#34D399; --green-soft:#0E2E26; --red:#F87181; --red-soft:#3A1520;
  --amber:#FBBF24; --amber-soft:#3A2A10; --violet:#A78BFA; --violet-soft:#2A1F45;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 22px rgba(0,0,0,.35);
  --shadow-lg:0 12px 48px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;transition:background .25s}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text);background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;width:100%;outline:none;transition:border .15s, box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 18%,transparent)}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
::placeholder{color:var(--text3)}
a{color:var(--primary);text-decoration:none}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}

/* ===== Shell ===== */
#app{display:flex;min-height:100dvh}
.sidebar{width:236px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);position:sticky;top:0;height:100dvh;display:flex;flex-direction:column;padding:18px 12px;z-index:30}
.logo{display:flex;align-items:center;gap:10px;padding:4px 10px 18px;font-weight:800;font-size:17px;letter-spacing:-.3px}
.logo .mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;color:#fff;font-size:17px;box-shadow:var(--shadow)}
.nav{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.nav .sec{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);padding:14px 10px 6px}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-sm);color:var(--text2);font-weight:500;font-size:13.5px;transition:all .15s}
.nav a:hover{background:var(--surface2);color:var(--text)}
.nav a.on{background:var(--primary-soft);color:var(--primary);font-weight:600}
.nav a .ic{width:20px;text-align:center;font-size:15px}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:25;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px}
.topbar h1{font-size:17px;font-weight:700;letter-spacing:-.2px;margin-right:auto}
.searchbox{position:relative;width:300px}
.searchbox input{padding-left:36px;background:var(--surface)}
.searchbox .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}
.iconbtn{width:38px;height:38px;border-radius:var(--r-sm);display:grid;place-items:center;background:var(--surface);border:1.5px solid var(--border);font-size:16px;transition:all .15s}
.iconbtn:hover{border-color:var(--primary);color:var(--primary)}
.content{padding:24px;max-width:1440px;width:100%;margin:0 auto;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.bottomnav{display:none}

/* ===== Components ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
.kpi .lb{font-size:12px;font-weight:600;color:var(--text2)}
.kpi .vl{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-top:5px}
.kpi .sub{font-size:11.5px;color:var(--text3);margin-top:3px}
.kpi.hero{background:linear-gradient(135deg,var(--primary),var(--accent));border:none;color:#fff}
.kpi.hero .lb,.kpi.hero .sub{color:rgba(255,255,255,.85)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 18px;border-radius:var(--r-sm);font-weight:600;font-size:13.5px;transition:all .15s;border:1.5px solid transparent}
.btn-p{background:var(--primary);color:#fff;box-shadow:var(--shadow)}
.btn-p:hover{background:var(--primary-strong);transform:translateY(-1px)}
.btn-o{border-color:var(--border);background:var(--surface);color:var(--text2)}
.btn-o:hover{border-color:var(--primary);color:var(--primary)}
.btn-d{background:var(--red);color:#fff}
.btn-g{background:var(--green);color:#fff}
.btn-sm{padding:6px 12px;font-size:12.5px}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:600}
.c-green{background:var(--green-soft);color:var(--green)}.c-red{background:var(--red-soft);color:var(--red)}
.c-amber{background:var(--amber-soft);color:var(--amber)}.c-blue{background:var(--primary-soft);color:var(--primary)}
.c-violet{background:var(--violet-soft);color:var(--violet)}.c-gray{background:var(--surface2);color:var(--text2)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--border)}
td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child td{border-bottom:none}
.right{text-align:right}.mono{font-variant-numeric:tabular-nums}
.pos{color:var(--green);font-weight:700}.neg{color:var(--red);font-weight:700}
.muted{color:var(--text3)}
.pagehead{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.pagehead h2{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-right:auto}
.pagehead p{width:100%;color:var(--text2);font-size:13px;margin-top:-6px}
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:var(--r-sm);padding:4px;width:max-content;max-width:100%;overflow-x:auto}
.tabs button{padding:7px 14px;border-radius:8px;font-weight:600;font-size:12.5px;color:var(--text2);white-space:nowrap}
.tabs button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.empty{text-align:center;padding:44px 20px;color:var(--text3)}
.empty .big{font-size:34px;margin-bottom:8px}
.avatar{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.frow{display:flex;gap:12px}.frow>*{flex:1}
.fgroup{margin-bottom:13px}
.chartbox{position:relative;height:260px}
.progress{height:7px;background:var(--surface2);border-radius:99px;overflow:hidden}
.progress i{display:block;height:100%;border-radius:99px;background:var(--primary);transition:width .5s}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(8,14,26,.55);backdrop-filter:blur(3px);z-index:80;display:grid;place-items:center;padding:16px;animation:fadein .18s}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:88dvh;display:flex;flex-direction:column;animation:pop .22s cubic-bezier(.2,.9,.3,1.2)}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
.modal .mh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center}
.modal .mh h3{font-size:16px;font-weight:700;margin-right:auto}
.modal .mb{padding:20px 22px;overflow-y:auto}
.modal .mf{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.modal.wide{max-width:840px}

/* toast */
#toasts{position:fixed;bottom:22px;right:22px;z-index:99;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--text);color:var(--bg);padding:12px 18px;border-radius:12px;font-weight:600;font-size:13px;box-shadow:var(--shadow-lg);animation:pop .25s;display:flex;gap:9px;align-items:center}

/* global search overlay */
#gsr{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);max-height:400px;overflow-y:auto;z-index:60;display:none}
#gsr .item{padding:10px 14px;display:flex;gap:10px;align-items:center;cursor:pointer;border-bottom:1px solid var(--border)}
#gsr .item:hover{background:var(--surface2)}
#gsr .item:last-child{border-bottom:none}

/* mobile */
@media(max-width:900px){
  .sidebar{display:none}
  .topbar{padding:12px 14px}
  .topbar h1{font-size:16px}
  .searchbox{width:100%;max-width:none;order:5}
  .topbar{flex-wrap:wrap}
  .content{padding:14px 14px 92px}
  .g4,.g3{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr}
  .frow{flex-direction:column;gap:0}
  .kpi .vl{font-size:19px}
  .bottomnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:40;background:color-mix(in srgb,var(--surface) 92%,transparent);backdrop-filter:blur(14px);border-top:1px solid var(--border);padding:8px 6px calc(8px + env(safe-area-inset-bottom));justify-content:space-around}
  .bottomnav a{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--text3);padding:4px 10px;border-radius:10px}
  .bottomnav a.on{color:var(--primary)}
  .bottomnav a .ic{font-size:19px}
  .bottomnav .fab{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;display:grid;place-items:center;font-size:23px;margin-top:-26px;box-shadow:var(--shadow-lg)}
  .hidemob{display:none}
  .tablewrap{overflow-x:auto;margin:0 -18px;padding:0 18px}
}
@media(min-width:901px){.tablewrap{overflow-x:auto}}

/* auth */
#authgate{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:18px;background:radial-gradient(1100px 700px at 15% 0%,#0E7490 0%,#0B1220 60%)}
#authgate.show{display:flex}
.authcard{width:100%;max-width:410px;background:var(--surface);border-radius:22px;padding:30px 26px;box-shadow:var(--shadow-lg);animation:pop .3s cubic-bezier(.2,.9,.3,1.2)}
.authcard .alogo{display:flex;align-items:center;gap:11px;font-weight:800;font-size:20px;margin-bottom:6px}
.authcard .alogo .mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;color:#fff;font-size:21px}
.authcard p{color:var(--text2);font-size:13px;margin-bottom:18px}
.autherr{background:var(--red-soft);color:var(--red);border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:600;margin-bottom:12px}
</style>
</head>
<body>
<div id="authgate"></div>
<div id="app">
  <aside class="sidebar">
    <div class="logo"><span class="mark">🐟</span><span id="brandname">AquaGest</span></div>
    <nav class="nav" id="sidenav"></nav>
    <button class="btn btn-p" style="margin-top:10px" onclick="go('venda-nova')">＋ Nova Venda</button>
  </aside>
  <div class="main">
    <header class="topbar">
      <h1 id="pagetitle">Dashboard</h1>
      <div class="searchbox">
        <span class="ic">🔍</span>
        <input id="gs" placeholder="Buscar cliente, espécie, venda, cidade..." autocomplete="off">
        <div id="gsr"></div>
      </div>
      <button class="iconbtn" id="themebtn" title="Alternar tema">🌙</button>
    </header>
    <div class="content" id="view"></div>
  </div>
</div>
<nav class="bottomnav" id="bottomnav"></nav>
<div id="modalroot"></div>
<div id="toasts"></div>

<script>
/* ============ UTILS ============ */
const $=s=>document.querySelector(s);
const fmt=n=>(n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fnum=n=>(n||0).toLocaleString('pt-BR');
const fpct=n=>(isFinite(n)?n:0).toLocaleString('pt-BR',{maximumFractionDigits:1})+'%';
const fdate=d=>new Date(d+'T12:00:00').toLocaleDateString('pt-BR');
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const daysAgo=n=>{const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10)};
const sum=(a,f)=>a.reduce((t,x)=>t+(f?f(x):x),0);
const avatarColor=s=>['#0E7490','#7C3AED','#0E9F6E','#D97706','#DB2777','#2563EB'][([...s].reduce((a,c)=>a+c.charCodeAt(0),0))%6];
function toast(msg,icon='✅'){const t=document.createElement('div');t.className='toast';t.innerHTML=`<span>${icon}</span>${esc(msg)}`;$('#toasts').appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},2600)}
function modal(html,wide=false){$('#modalroot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal${wide?' wide':''}">${html}</div></div>`}
function closeModal(){$('#modalroot').innerHTML=''}
function csvExport(rows,name){const csv=rows.map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(';')).join('\n');const b=new Blob(["﻿"+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name+'.csv';a.click();toast('Arquivo exportado')}

/* ============ STORE (camada de dados — trocar por API/PostgreSQL depois) ============ */
const KEY='aquagest_v2';
let DB=null;
function saveDB(){localStorage.setItem(KEY,JSON.stringify(DB));cloudSave()}
function loadDB(){const raw=localStorage.getItem(KEY);if(raw){DB=JSON.parse(raw)}else{DB=seed();saveDB()}}
function seed(){
  const sp=(n,d)=>({id:uid()+n.slice(0,2),name:n,desc:d,status:'ativo',obs:'',emoji:{'Tilápia':'🐟','Pacu':'🐡','Carpa Capim':'🎏','Carpa Colorida':'🎏','Pintado':'🐠','Tambacu':'🐟','Lambari':'🐠','Kinguio':'🐠','Koi':'🎏'}[n]||'🐟'});
  const species=[sp('Tilápia','Alevinos e juvenis de tilápia do Nilo'),sp('Pacu','Pacu para pesqueiros e engorda'),sp('Carpa Capim','Carpa herbívora para controle de vegetação'),sp('Carpa Colorida','Carpa ornamental'),sp('Pintado','Surubim pintado juvenil'),sp('Tambacu','Híbrido tambaqui × pacu'),sp('Lambari','Lambari para isca e consumo'),sp('Kinguio','Peixe ornamental'),sp('Koi','Carpa ornamental premium')];
  const mk=(spName,cm,price,costs,stock,min)=>{const s=species.find(x=>x.name===spName);return{id:uid()+cm,speciesId:s.id,cm,price,costs,stock,min}};
  const C=(compra,racao,frete,emb)=>({compra,racao,medicamentos:0.02,energia:0.03,funcionarios:0.05,frete,embalagem:emb,oxigenio:0.02,impostos:0.04,perdas:0.03,outros:0});
  const sizes=[
    mk('Tilápia',5,0.45,C(0.08,0.06,0.02,0.01),12000,3000), mk('Tilápia',8,0.75,C(0.12,0.10,0.03,0.01),8500,2000),
    mk('Tilápia',10,1.10,C(0.16,0.14,0.03,0.02),6200,1500), mk('Tilápia',15,1.90,C(0.25,0.28,0.05,0.02),3100,800),
    mk('Pacu',8,0.90,C(0.15,0.12,0.03,0.01),4200,1000), mk('Pacu',12,1.60,C(0.24,0.22,0.05,0.02),2600,600),
    mk('Pacu',20,3.50,C(0.55,0.60,0.10,0.04),900,300),
    mk('Carpa Capim',10,1.30,C(0.22,0.15,0.04,0.02),2100,500), mk('Carpa Capim',20,3.20,C(0.60,0.45,0.09,0.03),750,200),
    mk('Carpa Colorida',10,2.20,C(0.40,0.20,0.05,0.02),1300,300),
    mk('Pintado',12,2.80,C(0.70,0.40,0.08,0.03),980,250), mk('Tambacu',10,1.20,C(0.20,0.16,0.04,0.02),3400,800),
    mk('Lambari',5,0.25,C(0.05,0.03,0.01,0.005),18000,5000), mk('Kinguio',8,3.00,C(0.60,0.25,0.06,0.03),650,150),
    mk('Koi',15,18.00,C(4.50,1.80,0.30,0.10),220,50)
  ];
  const cst=(n,t,city,ph)=>({id:uid()+n.slice(0,2),name:n,type:t,phone:ph,whats:ph,city,state:'PR',address:'',obs:'',created:daysAgo(Math.floor(Math.random()*300)+30)});
  const customers=[
    cst('Pesqueiro Água Viva','Pesqueiro','Londrina','(43) 99911-2233'),cst('Pesqueiro do Lago Azul','Pesqueiro','Cambé','(43) 99822-3344'),
    cst('Sítio Boa Esperança','Produtor','Rolândia','(43) 99733-4455'),cst('AgroFish Revenda','Revendedor','Arapongas','(43) 99644-5566'),
    cst('Marcos Andrade','Cliente Final','Londrina','(43) 99555-6677'),cst('Pesque Pague Recanto','Pesqueiro','Ibiporã','(43) 99466-7788'),
    cst('Fazenda Santa Rita','Produtor','Sertanópolis','(43) 99377-8899'),cst('Aquário Center Norte','Revendedor','Maringá','(44) 99288-9900'),
    cst('Chácara do Vô Pedro','Cliente Final','Jataizinho','(43) 99199-0011'),cst('Piscicultura Irmãos Lima','Produtor','Bela Vista do Paraíso','(43) 98811-1122')
  ];
  // vendas de exemplo (90 dias)
  const sales=[];const pays=['PIX','Dinheiro','Transferência','Cartão','Boleto'];
  for(let i=0;i<64;i++){
    const d=daysAgo(Math.floor(Math.pow(Math.random(),1.4)*88));
    const c=Math.random()<0.85?customers[Math.floor(Math.random()*customers.length)]:null;
    const nItems=1+Math.floor(Math.random()*3);const items=[];let sub=0;
    for(let j=0;j<nItems;j++){
      const sz=sizes[Math.floor(Math.random()*sizes.length)];
      const qty=Math.max(10,Math.round((Math.random()*800+50)/10)*10);
      items.push({sizeId:sz.id,qty,unit:sz.price,obs:''});sub+=qty*sz.price;
    }
    const discount=Math.random()<0.3?Math.round(sub*0.05):0;const total=sub-discount;
    let payments;
    if(Math.random()<0.25){const v1=Math.round(total*0.6*100)/100;payments=[{method:'Cartão',value:v1},{method:'Dinheiro',value:Math.round((total-v1)*100)/100}]}
    else{payments=[{method:pays[Math.floor(Math.random()*pays.length)],value:total}]}
    sales.push({id:uid()+i,date:d,customerId:c?c.id:'',items,discount,payments,status:'pago',obs:''});
  }
  const expenses=[];
  const excat=[['Combustível','Variável',1200],['Energia','Fixa',2350],['Funcionários','Fixa',6800],['Pró-labore','Fixa',5000],['Impostos','Variável',1900],['Manutenção','Variável',780],['Ração (geral)','Variável',4200],['Internet','Recorrente',180],['Telefone','Recorrente',120],['Marketing','Variável',450]];
  for(let m=0;m<3;m++){excat.forEach(([cat,tp,v])=>{expenses.push({id:uid()+cat,date:daysAgo(m*30+Math.floor(Math.random()*8)+2),category:cat,type:tp,desc:cat+' — competência mensal',value:Math.round(v*(0.9+Math.random()*0.25))})})}
  const investments=[

/* ============ CÁLCULOS CENTRAIS ============ */
function sizeCost(sz){return sum(Object.values(sz.costs||{}))}
function sizeById(id){return DB.sizes.find(s=>s.id===id)}
function speciesById(id){return DB.species.find(s=>s.id===id)}
function custById(id){return DB.customers.find(c=>c.id===id)}
function sizeLabel(sz){const sp=speciesById(sz.speciesId);return `${sp?sp.name:'?'} ${sz.cm} cm`}
function calcItem(it){
  const sz=sizeById(it.sizeId);const cost=sz?sizeCost(sz):0;
  const gross=it.qty*it.unit-(it.disc||0);
  const totalCost=cost*it.qty;
  const profit=gross-totalCost; // lucro líquido do item (receita - custo total do peixe)
  const commission=profit>0?profit*(DB.settings.commissionPct/100):0;
  return{gross,totalCost,profit,commission};
}
function calcSale(s){
  let sub=0,cost=0,qty=0;
  s.items.forEach(it=>{const sz=sizeById(it.sizeId);sub+=it.qty*it.unit;cost+=(sz?sizeCost(sz):0)*it.qty;qty+=it.qty});
  const disc=sum(s.items,it=>it.disc||0)+(+s.discount||0);
  const total=sub-disc;
  const netProfit=total-cost;
  const commission=netProfit>0?netProfit*(DB.settings.commissionPct/100):0;
  return{sub,disc,total,cost,grossProfit:total-cost,netProfit,commission,qty,
    marginG:total?(total-cost)/total*100:0,marginN:total?netProfit/total*100:0};
}
function payLabel(s){const ps=s.payments||(s.pay?[{method:s.pay,value:calcSale(s).total}]:[]);
  return ps.map(p=>ps.length>1?`${p.method} ${fmt(p.value)}`:p.method).join(' + ')||'—'}
function saleCustName(s){const c=custById(s.customerId);return c?c.name:'Venda avulsa'}
function salesBetween(a,b){return DB.sales.filter(s=>s.date>=a&&s.date<=b)}
function expensesBetween(a,b){return DB.expenses.filter(e=>e.date>=a&&e.date<=b)}
function currentStock(sz){
  const moves=DB.stockMoves.filter(m=>m.sizeId===sz.id);
  const sold=sum(DB.sales.flatMap(s=>s.items).filter(i=>i.sizeId===sz.id),i=>i.qty);
  return sz.stock+sum(moves,m=>m.type==='entrada'||m.type==='reposicao'?m.qty:-m.qty)-sold;
}
function commissionTotals(){
  const earned=sum(DB.sales,s=>calcSale(s).commission);
  const received=sum(DB.withdrawals,w=>w.value);
  return{earned,received,available:earned-received};
}

function periodStats(a,b){
  const ss=salesBetween(a,b);
  let fat=0,cost=0,net=0,comm=0,qty=0;
  ss.forEach(s=>{const c=calcSale(s);fat+=c.total;cost+=c.cost;net+=c.netProfit;comm+=c.commission;qty+=c.qty});
  const exp=sum(expensesBetween(a,b),e=>e.value);
  return{sales:ss,fat,cost,gross:fat-cost,net:net-exp,netItems:net,exp,comm,qty,n:ss.length,
    ticket:ss.length?fat/ss.length:0,marginG:fat?(fat-cost)/fat*100:0,marginN:fat?(net-exp)/fat*100:0};
}
function prevRange(a,b){
  const d0=new Date(a+'T12:00:00'),d1=new Date(b+'T12:00:00');
  const len=Math.round((d1-d0)/86400000)+1;
  const pb=new Date(d0);pb.setDate(pb.getDate()-1);
  const pa=new Date(pb);pa.setDate(pa.getDate()-(len-1));
  return[pa.toISOString().slice(0,10),pb.toISOString().slice(0,10)];
}
function dch(cur,prev,invert=false){
  if(!prev)return'';
  const v=(cur-prev)/Math.abs(prev)*100;
  if(!isFinite(v)||Math.abs(v)<0.05)return'';
  const up=v>=0;const good=invert?!up:up;
  return`<span class="chip ${good?'c-green':'c-red'}" style="margin-left:6px">${up?'▲':'▼'} ${fpct(Math.abs(v))}</span>`;
}

function saveEspecie(id){

const COSTKEYS=[['compra','Compra'],['racao','Ração'],['medicamentos','Medicamentos'],['energia','Energia'],['funcionarios','Funcionários'],['frete','Frete'],['embalagem','Embalagem'],['oxigenio','Oxigênio'],['impostos','Impostos'],['perdas','Perdas'],['outros','Outros']];
let tamMode='simples';
function formTamanho(spId,szId){
  const sz=szId?sizeById(szId):{cm:'',price:'',costs:{},stock:0,min:0};
  const nz=COSTKEYS.filter(([k])=>+(sz.costs[k]||0)>0).length;
  tamMode=nz>1?'detalhado':'simples';
  modal(`<div class="mh"><h3>${szId?'Editar':'Novo'} tamanho — ${esc(speciesById(spId).name)}</h3><button class="iconbtn" onclick="closeModal()">✕</button></div>
  <div class="mb">
    <div class="frow">
      <div class="fgroup"><label>Tamanho (cm) *</label><input id="tCm" type="number" step="0.5" inputmode="decimal" value="${sz.cm}"></div>
      <div class="fgroup"><label>Preço de venda por peixe (R$) *</label><input id="tP" type="number" step="0.01" inputmode="decimal" value="${sz.price}" oninput="updTamCalc()"></div>
    </div>
    <div class="frow">
      <div class="fgroup"><label>Quantidade em estoque</label><input id="tS" type="number" inputmode="numeric" value="${sz.stock}"></div>
      <div class="fgroup"><label>Avisar quando estoque abaixo de</label><input id="tM" type="number" inputmode="numeric" value="${sz.min}"></div>
    </div>
    <label style="margin:8px 0 6px">Custo por peixe</label>
    <div class="tabs" style="margin-bottom:10px">
      <button id="tabSim" class="${tamMode==='simples'?'on':''}" onclick="tamMode='simples';swapTamMode()">Simples</button>
      <button id="tabDet" class="${tamMode==='detalhado'?'on':''}" onclick="tamMode='detalhado';swapTamMode()">Detalhado</button>
    </div>
    <div id="costSimple" style="display:${tamMode==='simples'?'block':'none'}">
      <div class="fgroup" style="max-width:240px"><label>Custo total por peixe (R$)</label><input id="tcSimple" type="number" step="0.001" inputmode="decimal" value="${(sizeCost(sz)||0).toFixed(3).replace(/\.?0+$/,'')||0}" oninput="updTamCalc()"></div>
      <p class="muted" style="font-size:12px;margin-top:-6px">Some tudo o que gasta por peixe (compra, ração, frete...) e coloque aqui. Se quiser separar por categoria, use a aba Detalhado.</p>
    </div>
    <div id="costDetail" style="display:${tamMode==='detalhado'?'block':'none'}">
      <div class="grid g3" style="gap:8px">
      ${COSTKEYS.map(([k,l])=>`<div><label style="font-size:10.5px">${l}</label><input id="tc_${k}" type="number" step="0.001" inputmode="decimal" value="${sz.costs[k]||0}" oninput="updTamCalc()" style="padding:7px 9px;font-size:13px"></div>`).join('')}
      </div>
    </div>
    <div class="card" style="margin-top:14px;background:var(--surface2);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div><div class="muted" style="font-size:11px;font-weight:600">CUSTO TOTAL</div><b id="tcTot">—</b></div>
      <div><div class="muted" style="font-size:11px;font-weight:600">LUCRO/PEIXE</div><b id="tcLuc">—</b></div>
      <div><div class="muted" style="font-size:11px;font-weight:600">MARGEM</div><b id="tcMg">—</b></div>
      <div><div class="muted" style="font-size:11px;font-weight:600">SUA COMISSÃO/PEIXE</div><b id="tcCo">—</b></div>
    </div>
  </div>
  <div class="mf">${szId?`<button class="btn btn-d btn-sm" style="margin-right:auto" onclick="if(confirm('Excluir tamanho?')){DB.sizes=DB.sizes.filter(s=>s.id!=='${szId}');saveDB();closeModal();vEspecies()}">Excluir</button>`:''}<button class="btn btn-o" onclick="closeModal()">Cancelar</button><button class="btn btn-p" onclick="saveTamanho('${spId}','${szId||''}')">Salvar</button></div>`,true);
  updTamCalc();
}
function swapTamMode(){
  $('#tabSim').classList.toggle('on',tamMode==='simples');
  $('#tabDet').classList.toggle('on',tamMode==='detalhado');
  $('#costSimple').style.display=tamMode==='simples'?'block':'none';
  $('#costDetail').style.display=tamMode==='detalhado'?'block':'none';
  if(tamMode==='simples'){const det=sum(COSTKEYS,([k])=>+document.getElementById('tc_'+k).value||0);if(det)$('#tcSimple').value=det}
  updTamCalc();
}
function curTamCost(){
  return tamMode==='simples'?(+$('#tcSimple').value||0):sum(COSTKEYS,([k])=>+document.getElementById('tc_'+k).value||0);
}
function updTamCalc(){
  const p=+$('#tP').value||0;const cost=curTamCost();
  const luc=p-cost;
  $('#tcTot').textContent=fmt(cost);$('#tcLuc').textContent=fmt(luc);
  $('#tcLuc').className=luc>=0?'pos':'neg';
  $('#tcMg').textContent=fpct(p?luc/p*100:0);
  $('#tcCo').textContent=fmt(luc>0?luc*DB.settings.commissionPct/100:0);
}
function saveTamanho(spId,szId){
  const cm=+$('#tCm').value,price=+$('#tP').value;
  if(!cm||!price)return toast('Informe o tamanho e o preço','⚠️');
  let costs={};
  if(tamMode==='simples'){costs={compra:+$('#tcSimple').value||0}}
  else{COSTKEYS.forEach(([k])=>costs[k]=+document.getElementById('tc_'+k).value||0)}
  const data={cm,price,costs,stock:+$('#tS').value||0,min:+$('#tM').value||0};
  if(szId){Object.assign(sizeById(szId),data)}else{DB.sizes.push({id:uid(),speciesId:spId,...data})}
  saveDB();closeModal();toast('Tamanho salvo');vEspecies();
}

function newItem(){return{sizeId:'',qty:'',unit:'',obs:''}}
function renderItems(){
  $('#itemsBox').innerHTML=saleDraft.items.map((it,i)=>{
    const sz=sizeById(it.sizeId);
    const c=sz&&+it.qty?calcItem({...it,qty:+it.qty,unit:+it.unit||0,disc:0}):null;
    return`<div class="card" style="margin-bottom:12px">

        <select onchange="pickSize(${i},this.value)">
          <option value="">Toque para escolher...</option>
          ${DB.species.filter(s=>s.status==='ativo').map(sp=>`<optgroup label="${sp.emoji} ${esc(sp.name)}">${DB.sizes.filter(z=>z.speciesId===sp.id).sort((a,b)=>a.cm-b.cm).map(z=>`<option value="${z.id}" ${it.sizeId===z.id?'selected':''}>${z.cm} cm — ${fmt(z.price)} · ${fnum(currentStock(z))} disponíveis</option>`).join('')}</optgroup>`).join('')}
        </select></div>
      <div class="frow">

        <div class="fgroup"><label>Preço por peixe (R$)</label><input type="number" step="0.01" inputmode="decimal" value="${it.unit}" oninput="saleDraft.items[${i}].unit=this.value;updSale(${i})"></div>
      </div>
      <div id="itCalc${i}">${c?itemCalcHtml(c):'<span class="muted" style="font-size:12px">Escolha o peixe e a quantidade — o valor aparece aqui na hora</span>'}</div>
    </div>`}).join('');
  updSummary();updPayHint();
}
function itemCalcHtml(c){
  return`<div style="display:flex;gap:16px;flex-wrap:wrap;background:var(--surface2);border-radius:10px;padding:10px 14px;font-size:12.5px">
    <span>Valor: <b>${fmt(c.gross)}</b></span>
    <span>Custo: <b class="muted">${fmt(c.totalCost)}</b></span>
    <span>Lucro: <b class="${c.profit>=0?'pos':'neg'}">${fmt(c.profit)}</b></span>
    <span>💼 Comissão: <b class="pos">${fmt(c.commission)}</b></span></div>`;
}
function pickSize(i,id){
  const it=saleDraft.items[i];it.sizeId=id;
  const sz=sizeById(id);if(sz)it.unit=it.unit||sz.price;
  renderItems();
}
function updSale(i){
  const it=saleDraft.items[i];const sz=sizeById(it.sizeId);
  const box=document.getElementById('itCalc'+i);
  if(sz&&+it.qty){box.innerHTML=itemCalcHtml(calcItem({...it,qty:+it.qty,unit:+it.unit||0,disc:0}))}
  updSummary();updPayHint();
}
function draftCalc(){
  const items=saleDraft.items.filter(it=>it.sizeId&&+it.qty).map(it=>({sizeId:it.sizeId,qty:+it.qty,unit:+it.unit||0,obs:it.obs}));
  return{items,c:calcSale({items,discount:+saleDraft.discount||0})};
}
function renderPays(){
  const METHODS=['PIX','Dinheiro','Cartão','Transferência','Boleto'];
  $('#payBox').innerHTML=saleDraft.payments.map((p,i)=>`
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <select style="flex:1" onchange="saleDraft.payments[${i}].method=this.value">${METHODS.map(m=>`<option ${p.method===m?'selected':''}>${m}</option>`).join('')}</select>
      <input style="flex:1" type="number" step="0.01" inputmode="decimal" placeholder="Valor R$" value="${p.value}" oninput="saleDraft.payments[${i}].value=this.value;updPayHint()">
      <button class="btn btn-o btn-sm" onclick="fillRestante(${i})" title="Preencher com o que falta">restante</button>
      ${saleDraft.payments.length>1?`<button class="iconbtn" style="width:32px;height:32px" onclick="saleDraft.payments.splice(${i},1);renderPays();updPayHint()">🗑️</button>`:''}
    </div>`).join('');
  updPayHint();
}
function fillRestante(i){
  const{c}=draftCalc();
  const others=sum(saleDraft.payments.filter((_,j)=>j!==i),p=>+p.value||0);
  saleDraft.payments[i].value=Math.max(0,Math.round((c.total-others)*100)/100);
  renderPays();
}
function updPayHint(){
  const el=document.getElementById('payHint');if(!el)return;
  const{c}=draftCalc();
  const paid=sum(saleDraft.payments,p=>+p.value||0);
  const diff=Math.round((c.total-paid)*100)/100;
  if(!c.total){el.textContent='';return}
  if(Math.abs(diff)<0.01){el.innerHTML='<span class="pos">✓ Pagamento confere com o total ('+fmt(c.total)+')</span>'}
  else if(diff>0){el.innerHTML='Falta <b class="neg">'+fmt(diff)+'</b> para completar o total de '+fmt(c.total)}
  else{el.innerHTML='<span class="neg">Passou '+fmt(-diff)+' do total de '+fmt(c.total)+'</span>'}
}
function updSummary(){
  const{c}=draftCalc();const ct=commissionTotals();
  const row=(l,v,cls='')=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px"><span class="muted">${l}</span><b class="${cls} mono">${v}</b></div>`;
  const el=document.getElementById('saleSummary');if(!el)return;
  el.innerHTML=
    row('Subtotal',fmt(c.sub))+row('Desconto','− '+fmt(c.disc))+
    `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><b style="font-size:15px">Total a cobrar</b><b style="font-size:20px" class="mono">${fmt(c.total)}</b></div>`+
    row('Peixes vendidos',fnum(c.qty))+
    row('Custo dos peixes',fmt(c.cost))+
    row('Lucro líquido',fmt(c.netProfit),c.netProfit>=0?'pos':'neg')+
    row('Margem',fpct(c.marginN))+
    `<div style="background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:12px;padding:12px 14px;margin-top:12px;color:#fff">
      <div style="font-size:11px;font-weight:700;opacity:.85">💼 SUA COMISSÃO (${DB.settings.commissionPct}% DO LUCRO)</div>
      <div style="font-size:21px;font-weight:800">${fmt(c.commission)}</div>
      <div style="font-size:11px;opacity:.85">saldo após esta venda: ${fmt(ct.available+c.commission)}</div></div>`;
}
function finishSale(){
  const{items,c}=draftCalc();
  if(!items.length)return toast('Adicione ao menos um peixe com quantidade','⚠️');
  // pagamentos
  let pays=saleDraft.payments.filter(p=>+p.value>0).map(p=>({method:p.method,value:+p.value}));
  if(!pays.length){pays=[{method:saleDraft.payments[0]?.method||'PIX',value:c.total}]}
  const paid=sum(pays,p=>p.value);
  if(Math.abs(paid-c.total)>0.01)return toast(`A soma dos pagamentos (${fmt(paid)}) difere do total (${fmt(c.total)}). Use o botão "restante".`,'⚠️');
  // estoque
  for(const it of items){const sz=sizeById(it.sizeId);if(currentStock(sz)<it.qty&&!confirm(`Estoque de ${sizeLabel(sz)} é ${fnum(currentStock(sz))} e a venda pede ${fnum(it.qty)}. Continuar mesmo assim?`))return}
  // cliente opcional
  let customerId='';
  const nm=saleDraft.cliente.name.trim();
  if(nm){
    let cust=DB.customers.find(x=>x.name.toLowerCase()===nm.toLowerCase());
    if(cust){if(saleDraft.cliente.phone)cust.phone=saleDraft.cliente.phone;if(saleDraft.cliente.city)cust.city=saleDraft.cliente.city}
    else{cust={id:uid(),name:nm,phone:saleDraft.cliente.phone||'',whats:saleDraft.cliente.phone||'',city:saleDraft.cliente.city||'',state:'PR',address:'',obs:'',type:'Cliente Final',created:today()};DB.customers.push(cust);toast('Novo cliente cadastrado automaticamente','👤')}
    customerId=cust.id;
  }
  DB.sales.push({id:uid(),date:saleDraft.date,customerId,items,discount:+saleDraft.discount||0,payments:pays,status:'pago',obs:saleDraft.obs});
  saveDB();
  const custName=customerId?custById(customerId).name:'Venda avulsa';
  saleDraft=null;
  modal(`<div class="mh"><h3>✅ Venda registrada</h3><button class="iconbtn" onclick="closeModal();go('dashboard')">✕</button></div>
  <div class="mb" style="text-align:center">
    <div style="font-size:44px;margin-bottom:6px">🎉</div>
    <div style="font-size:15px"><b>${esc(custName)}</b></div>
    <div style="font-size:30px;font-weight:800;margin:8px 0">${fmt(c.total)}</div>
    <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">${pays.map(p=>`<span class="chip c-blue">${esc(p.method)}: ${fmt(p.value)}</span>`).join('')}${c.disc?`<span class="chip c-amber">desconto ${fmt(c.disc)}</span>`:''}</div>
    <div class="grid g2" style="text-align:left;margin-top:14px">
      <div class="card kpi"><div class="lb">Lucro líquido</div><div class="vl pos">${fmt(c.netProfit)}</div><div class="sub">margem ${fpct(c.marginN)}</div></div>
      <div class="card kpi"><div class="lb">💼 Sua comissão</div><div class="vl pos">${fmt(c.commission)}</div><div class="sub">saldo disponível ${fmt(commissionTotals().available)}</div></div>
    </div></div>
  <div class="mf"><button class="btn btn-o" onclick="closeModal();go('vendas')">Ver vendas</button><button class="btn btn-p" onclick="closeModal();go('venda-nova')">＋ Nova venda</button></div>`);
  toast('Venda salva · estoque baixado automaticamente');
}

function formSaque(){
  const ct=commissionTotals();
  modal(`<div class="mh"><h3>💰 Receber comissão</h3><button class="iconbtn" onclick="closeModal()">✕</button></div>

function saveSaque(){
  const v=+$('#wV').value;const ct=commissionTotals();
  if(!v||v<=0)return toast('Informe o valor','⚠️');

  DB.withdrawals.push({id:uid(),date:$('#wD').value,period:$('#wP').value,value:v,obs:$('#wO').value});
  saveDB();closeModal();toast('Comissão marcada como recebida','💰');vComissoes();
}

/* ============ FLUXO DE CAIXA ============ */
let fluxoMode='diario';
function vFluxo(){
  $('#view').innerHTML=`
  <div class="pagehead"><h2>Fluxo de Caixa</h2>
    <div class="tabs">${[['diario','Diário (30d)'],['semanal','Semanal (12s)'],['mensal','Mensal (12m)']].map(([k,l])=>`<button class="${fluxoMode===k?'on':''}" onclick="fluxoMode='${k}';vFluxo()">${l}</button>`).join('')}</div></div>
  <div id="fluxoKpis" class="grid g3" style="margin-bottom:14px"></div>
  <div class="card"><b>Entradas × Saídas × Saldo</b><div class="chartbox" style="height:300px;margin-top:10px"><canvas id="chFlx"></canvas></div></div>
  <div class="card" style="padding:0;margin-top:14px"><div class="tablewrap"><table id="fluxoTable"></table></div></div>`;
  const buckets=[];
  if(fluxoMode==='diario'){for(let i=29;i>=0;i--){const d=daysAgo(i);buckets.push({label:d.slice(8,10)+'/'+d.slice(5,7),a:d,b:d})}}
  else if(fluxoMode==='semanal'){for(let i=11;i>=0;i--){buckets.push({label:'Sem '+fdate(daysAgo(i*7+6)).slice(0,5),a:daysAgo(i*7+6),b:daysAgo(i*7)})}}
  else{for(let i=11;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const m=d.toISOString().slice(0,7);buckets.push({label:m.slice(5,7)+'/'+m.slice(2,4),a:m+'-01',b:m+'-31'})}}
  let acc=0;
  buckets.forEach(bk=>{
    bk.in=sum(salesBetween(bk.a,bk.b),s=>calcSale(s).total);
    bk.out=sum(expensesBetween(bk.a,bk.b),e=>e.value)+sum(DB.investments.filter(i=>i.date>=bk.a&&i.date<=bk.b),i=>i.value)+sum(DB.withdrawals.filter(w=>w.date>=bk.a&&w.date<=bk.b),w=>w.value);
    bk.saldo=bk.in-bk.out;acc+=bk.saldo;bk.acc=acc;
  });
  const tIn=sum(buckets,b=>b.in),tOut=sum(buckets,b=>b.out);
  const openRec=sum(DB.receivables.filter(r=>r.status==='aberto'),r=>r.value),openPay=sum(DB.payables.filter(p=>p.status==='aberto'),p=>p.value);
  $('#fluxoKpis').innerHTML=`
    <div class="card kpi"><div class="lb">Entradas (realizado)</div><div class="vl pos">${fmt(tIn)}</div></div>
    <div class="card kpi"><div class="lb">Saídas (realizado)</div><div class="vl neg">${fmt(tOut)}</div><div class="sub">despesas + investimentos + comissões pagas</div></div>
    <div class="card kpi"><div class="lb">Saldo · Previsto</div><div class="vl ${tIn-tOut>=0?'pos':'neg'}">${fmt(tIn-tOut)}</div><div class="sub">previsto: ${fmt(tIn-tOut+openRec-openPay)} (com contas em aberto)</div></div>`;
  mkChart('chFlx',{type:'bar',data:{labels:buckets.map(b=>b.label),datasets:[
    {label:'Entradas',data:buckets.map(b=>b.in),backgroundColor:'#0E9F6E',borderRadius:4},
    {label:'Saídas',data:buckets.map(b=>-b.out),backgroundColor:'#E02D3C99',borderRadius:4},
    {label:'Saldo acumulado',data:buckets.map(b=>b.acc),type:'line',borderColor:'#0E7490',borderWidth:2.5,pointRadius:0,tension:.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true,ticks:{maxTicksLimit:12}},y:{stacked:true}}}});
  $('#fluxoTable').innerHTML=`<thead><tr><th>Período</th><th class="right">Entradas</th><th class="right">Saídas</th><th class="right">Saldo</th><th class="right">Acumulado</th></tr></thead><tbody>
    ${[...buckets].reverse().map(b=>`<tr><td><b>${b.label}</b></td><td class="right mono pos">${fmt(b.in)}</td><td class="right mono neg">${fmt(b.out)}</td><td class="right mono ${b.saldo>=0?'pos':'neg'}">${fmt(b.saldo)}</td><td class="right mono">${fmt(b.acc)}</td></tr>`).join('')}</tbody>`;
}

/* ============ INTELIGÊNCIA ============ */
function vInteligencia(){
  const now=periodStats(daysAgo(29),today());
  const prev=periodStats(daysAgo(59),daysAgo(30));
  const ins=[];
  const pct=(a,b)=>b?((a-b)/Math.abs(b)*100):0;
  const add=(ic,tone,t,d)=>ins.push({ic,tone,t,d});
  // margem por produto
  const bySz={};now.sales.forEach(s=>s.items.forEach(it=>{const c=calcItem(it);bySz[it.sizeId]=bySz[it.sizeId]||{fat:0,profit:0,qty:0};bySz[it.sizeId].fat+=c.gross;bySz[it.sizeId].profit+=c.profit;bySz[it.sizeId].qty+=it.qty}));
  const margins=Object.entries(bySz).filter(([,v])=>v.fat>0).map(([id,v])=>({id,m:v.profit/v.fat*100,fat:v.fat}));
  if(margins.length){const best=margins.sort((a,b)=>b.m-a.m)[0];add('💎','green',`${sizeLabel(sizeById(best.id))} tem a maior margem do mês`,`Margem líquida de ${fpct(best.m)} sobre ${fmt(best.fat)} faturados nos últimos 30 dias. Vale priorizar nas ofertas.`)}
  // participação por espécie
  const bySp={};now.sales.forEach(s=>s.items.forEach(it=>{const sz=sizeById(it.sizeId);if(sz)bySp[sz.speciesId]=(bySp[sz.speciesId]||0)+calcItem(it).gross}));
  const topSp=Object.entries(bySp).sort((a,b)=>b[1]-a[1])[0];
  if(topSp&&now.fat)add('🐟','blue',`${speciesById(topSp[0])?.name} representa ${fpct(topSp[1]/now.fat*100)} do faturamento`,`É a espécie líder do período. Concentração alta em uma espécie pode ser risco — acompanhe estoque e diversificação.`);
  // faturamento e ticket
  const vf=pct(now.fat,prev.fat);
  add('📈',vf>=0?'green':'red',`Faturamento ${vf>=0?'subiu':'caiu'} ${fpct(Math.abs(vf))} vs. 30 dias anteriores`,`${fmt(prev.fat)} → ${fmt(now.fat)}.`);
  const vt=pct(now.ticket,prev.ticket);
  if(Math.abs(vt)>2)add('🎫',vt>=0?'green':'amber',`Ticket médio ${vt>=0?'aumentou':'diminuiu'} ${fpct(Math.abs(vt))}`,`${fmt(prev.ticket)} → ${fmt(now.ticket)} por venda.`);
  // margem líquida
  const vm=now.marginN-prev.marginN;
  if(Math.abs(vm)>0.5)add('📊',vm>=0?'green':'red',`Margem líquida ${vm>=0?'subiu':'caiu'} ${fpct(Math.abs(vm))} p.p.`,`De ${fpct(prev.marginN)} para ${fpct(now.marginN)}. ${vm<0?'O lucro caiu principalmente devido às despesas do período ('+fmt(now.exp)+').':''}`);
  // despesas por categoria
  const catNow={},catPrev={};
  expensesBetween(daysAgo(29),today()).forEach(e=>catNow[e.category]=(catNow[e.category]||0)+e.value);
  expensesBetween(daysAgo(59),daysAgo(30)).forEach(e=>catPrev[e.category]=(catPrev[e.category]||0)+e.value);
  Object.keys(catNow).forEach(c=>{const v=pct(catNow[c],catPrev[c]||0);if(catPrev[c]&&Math.abs(v)>=12)add('💸',v>0?'amber':'green',`${c} ${v>0?'aumentou':'reduziu'} ${fpct(Math.abs(v))}`,`${fmt(catPrev[c])} → ${fmt(catNow[c])} no comparativo mensal.`)});
  // estoque crítico
  const low=DB.sizes.filter(sz=>currentStock(sz)<=sz.min);
  if(low.length)add('📦','red',`${low.length} produto(s) precisam de reposição`,low.map(sz=>`${sizeLabel(sz)} (${fnum(currentStock(sz))} un, mínimo ${fnum(sz.min)})`).join(' · '));
  // clientes inativos
  const inactive=DB.customers.filter(c=>{const lastS=DB.sales.filter(s=>s.customerId===c.id).sort((a,b)=>b.date.localeCompare(a.date))[0];return lastS&&lastS.date<daysAgo(45)});
  if(inactive.length)add('👋','amber',`${inactive.length} cliente(s) sem comprar há mais de 45 dias`,`Vale um contato: ${inactive.slice(0,4).map(c=>c.name).join(', ')}${inactive.length>4?'…':''}`);
  // comissão
  const ct=commissionTotals();
  if(ct.available>500)add('💼','blue',`Você tem ${fmt(ct.available)} de comissão disponível`,`Use o botão "Receber Comissão" na Carteira para registrar o saque.`);
  const tones={green:'c-green',red:'c-red',amber:'c-amber',blue:'c-blue'};
  $('#view').innerHTML=`
  <div class="pagehead"><h2>✨ Inteligência</h2><p>Análises automáticas dos últimos 30 dias comparadas ao período anterior. Atualiza sozinha a cada dado novo.</p></div>
  <div class="grid g2">
  ${ins.map(i=>`<div class="card" style="display:flex;gap:14px;border-left:4px solid var(--${i.tone==='green'?'green':i.tone==='red'?'red':i.tone==='amber'?'amber':'primary'})">
    <span style="font-size:26px">${i.ic}</span>
    <div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><b>${esc(i.t)}</b></div>
    <div class="muted" style="font-size:12.5px;margin-top:4px">${esc(i.d)}</div></div></div>`).join('')||'<div class="empty">Registre vendas para gerar análises.</div>'}
  </div>`;
}

/* ============ CONFIGURAÇÕES ============ */
function vConfig(){
  const s=DB.settings;const cfg=sbCfg()||{url:'',key:''};
  const hasPass=!!localStorage.getItem('aquagest_pass');
  $('#view').innerHTML=`
  <div class="pagehead"><h2>Configurações</h2></div>
  <div class="grid g2" style="align-items:start">
    <div>
      <div class="card" style="margin-bottom:14px">
        <b>Empresa</b>
        <div class="fgroup" style="margin-top:12px"><label>Nome da empresa</label><input id="cfN" value="${esc(s.company)}"></div>
        <div class="frow">
          <div class="fgroup"><label>Percentual de comissão (%)</label><input id="cfC" type="number" step="0.5" value="${s.commissionPct}"></div>
          <div class="fgroup"><label>Tema padrão</label><select id="cfT"><option value="light" ${s.theme==='light'?'selected':''}>Claro</option><option value="dark" ${s.theme==='dark'?'selected':''}>Escuro</option></select></div>
        </div>
        <button class="btn btn-p" onclick="saveConfig()">Salvar configurações</button>
      </div>
      <div class="card">
        <b>Backup e dados</b>
        <p class="muted" style="font-size:12.5px;margin:8px 0 14px">Exporte o backup regularmente e guarde em local seguro.</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-o" onclick="backupExport()">⬇ Exportar backup (.json)</button>
          <label class="btn btn-o" style="cursor:pointer">⬆ Restaurar backup<input type="file" accept=".json" style="display:none" onchange="backupImport(this)"></label>
        </div>
        <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
          <button class="btn btn-d btn-sm" onclick="if(confirm('Apagar TODOS os dados e recomeçar com dados de exemplo?')){localStorage.removeItem(KEY);location.reload()}">Resetar sistema</button>
        </div>
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:14px">
        <b>☁️ Conta e nuvem (Supabase)</b>
        <p class="muted" style="font-size:12.5px;margin:8px 0 12px">
        ${sbUser?`Conectado como <b>${esc(sbUser.email)}</b> — seus dados sincronizam automaticamente na nuvem.`
        :cfg.url?'Supabase configurado, mas você não está logado.'
        :'Conecte seu projeto gratuito do Supabase para ter login por e-mail/senha e acessar seus dados de qualquer aparelho. Veja o guia de publicação.'}</p>
        <div class="fgroup"><label>Project URL</label><input id="cfSbU" placeholder="https://xxxx.supabase.co" value="${esc(cfg.url)}"></div>
        <div class="fgroup"><label>Chave anon (public)</label><input id="cfSbK" placeholder="eyJhbGciOi..." value="${esc(cfg.key)}"></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-p btn-sm" onclick="localStorage.setItem('aquagest_sb',JSON.stringify({url:$('#cfSbU').value.trim().replace(/\/$/,''),key:$('#cfSbK').value.trim()}));location.reload()">Salvar e conectar</button>
          ${sbUser?`<button class="btn btn-o btn-sm" onclick="doLogout()">Sair da conta</button>`:''}
          ${cfg.url?`<button class="btn btn-o btn-sm" onclick="if(confirm('Remover a conexão com o Supabase? (os dados locais continuam)')){localStorage.removeItem('aquagest_sb');location.reload()}">Desconectar</button>`:''}
        </div>
      </div>
      <div class="card">
        <b>🔒 Senha local</b>
        <p class="muted" style="font-size:12.5px;margin:8px 0 12px">${hasPass?'Senha local ativa — será pedida ao abrir o sistema neste dispositivo.':'Defina uma senha para proteger o sistema neste dispositivo (para quem usa o modo local).'}</p>
        <div class="frow">
          <div class="fgroup"><label>${hasPass?'Nova senha':'Criar senha'}</label><input id="cfLP" type="password" placeholder="mínimo 4 caracteres"></div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-p btn-sm" onclick="setLocalPass()">Salvar senha</button>
          ${hasPass?`<button class="btn btn-o btn-sm" onclick="localStorage.removeItem('aquagest_pass');toast('Senha local removida');vConfig()">Remover senha</button>`:''}
        </div>
      </div>
    </div>
  </div>`;
}
function saveConfig(){
  DB.settings.company=$('#cfN').value;
  DB.settings.commissionPct=+$('#cfC').value||15;
  DB.settings.theme=$('#cfT').value;
  document.documentElement.dataset.theme=DB.settings.theme;
  saveDB();$('#brandname').textContent=DB.settings.company.split(' ')[0];toast('Configurações salvas');
}
async function setLocalPass(){
  const pw=$('#cfLP').value;
  if(!pw||pw.length<4)return toast('Use pelo menos 4 caracteres','⚠️');
  localStorage.setItem('aquagest_pass',await hashPass(pw));
  toast('Senha local salva','🔒');vConfig();
}
function backupExport(){
  const b=new Blob([JSON.stringify(DB,null,1)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='aquagest-backup-'+today()+'.json';a.click();toast('Backup exportado');
}
function backupImport(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.sales||!d.species)throw 0;DB=d;saveDB();toast('Backup restaurado');location.reload()}catch(e){toast('Arquivo inválido','⚠️')}};
  r.readAsText(f);
}

/* ============ AUTENTICAÇÃO & NUVEM (SUPABASE) ============ */
let sb=null,sbUser=null,cloudTimer=null;
const sbCfg=()=>{try{return JSON.parse(localStorage.getItem('aquagest_sb')||'null')}catch(e){return null}};
function authGate(html){const g=$('#authgate');g.classList.add('show');g.innerHTML=`<div class="authcard">${html}</div>`}
function authDone(){$('#authgate').classList.remove('show');$('#authgate').innerHTML='';if(!window.__appInit){window.__appInit=true;initApp()}else{render()}}
async function hashPass(pw){try{const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('aquagest|'+pw));return btoa(String.fromCharCode(...new Uint8Array(b)))}catch(e){return btoa(unescape(encodeURIComponent('aq|'+pw)))}}
const authHead=`<div class="alogo"><span class="mark">🐟</span>AquaGest</div>`;
function initAuth(){
  const cfg=sbCfg();
  if(cfg&&window.supabase){
    sb=window.supabase.createClient(cfg.url,cfg.key);
    sb.auth.getSession().then(async({data})=>{
      if(data&&data.session){sbUser=data.session.user;await cloudLoad();authDone();toast('Conectado à nuvem','☁️')}
      else showLogin();
    }).catch(()=>showLogin());
  }else if(localStorage.getItem('aquagest_pass')){showLocalLogin()}
  else{showWelcome()}
}
function showWelcome(){
  authGate(`${authHead}<p>Sistema de gestão da sua piscicultura. Como você quer usar?</p>
  <button class="btn btn-p" style="width:100%;padding:13px;margin-bottom:10px" onclick="authDone();toast('Modo local: dados salvos neste dispositivo. Configure senha e nuvem em Configurações.','📱')">📱 Entrar (modo local)</button>
  <button class="btn btn-o" style="width:100%;padding:13px" onclick="showSbSetup()">☁️ Conectar à nuvem (Supabase)</button>
  <p style="margin-top:14px;margin-bottom:0;font-size:11.5px">No modo nuvem seus dados ficam no Supabase com login e senha, acessíveis de qualquer dispositivo.</p>`);
}
function showSbSetup(){
  const cfg=sbCfg()||{url:'',key:''};
  authGate(`${authHead}<p>Cole os dados do seu projeto Supabase (veja o guia de publicação — leva poucos minutos e é grátis).</p>
  <div class="fgroup"><label>Project URL</label><input id="sbU" placeholder="https://xxxx.supabase.co" value="${esc(cfg.url)}"></div>
  <div class="fgroup"><label>Chave anon (public)</label><input id="sbK" placeholder="eyJhbGciOi..." value="${esc(cfg.key)}"></div>
  <button class="btn btn-p" style="width:100%;padding:12px" onclick="saveSbCfg()">Salvar e continuar</button>
  <button class="btn btn-o" style="width:100%;margin-top:8px" onclick="showWelcome()">Voltar</button>`);
}
function saveSbCfg(){
  const url=$('#sbU').value.trim().replace(/\/$/,''),key=$('#sbK').value.trim();
  if(!url.startsWith('https://')||!key)return toast('Preencha a URL e a chave anon','⚠️');
  localStorage.setItem('aquagest_sb',JSON.stringify({url,key}));
  location.reload();
}
function showLogin(msg){
  authGate(`${authHead}<p>Entre com seu e-mail e senha para acessar seus dados na nuvem.</p>
  ${msg?`<div class="autherr">${esc(msg)}</div>`:''}
  <div class="fgroup"><label>E-mail</label><input id="lE" type="email" autocomplete="email"></div>
  <div class="fgroup"><label>Senha</label><input id="lP" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')sbLogin()"></div>
  <button class="btn btn-p" style="width:100%;padding:13px" onclick="sbLogin()">Entrar</button>
  <button class="btn btn-o" style="width:100%;margin-top:8px" onclick="sbSignup()">Criar conta nova</button>
  <div style="display:flex;justify-content:space-between;margin-top:14px">
    <a href="#" style="font-size:12px" onclick="showSbSetup();return false">Configurar Supabase</a>
    <a href="#" style="font-size:12px" onclick="authDone();toast('Você entrou sem nuvem — dados apenas neste dispositivo','📱');return false">Entrar sem nuvem</a>
  </div>`);
}
async function sbLogin(){
  const email=$('#lE').value.trim(),password=$('#lP').value;
  if(!email||!password)return toast('Preencha e-mail e senha','⚠️');
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password});
    if(error)return showLogin(error.message.includes('Invalid')?'E-mail ou senha incorretos.':error.message);
    sbUser=data.user;await cloudLoad();authDone();toast('Bem-vindo de volta!','👋');
  }catch(e){showLogin('Falha de conexão. Verifique a internet e a configuração do Supabase.')}
}
async function sbSignup(){
  const email=$('#lE').value.trim(),password=$('#lP').value;
  if(!email||!password)return toast('Preencha e-mail e senha para criar a conta','⚠️');
  if(password.length<6)return toast('A senha precisa de pelo menos 6 caracteres','⚠️');
  try{
    const{data,error}=await sb.auth.signUp({email,password});
    if(error)return showLogin(error.message);
    if(data.session){sbUser=data.user;await cloudLoad();authDone();toast('Conta criada com sucesso!','🎉')}
    else showLogin('Conta criada! Confirme pelo link enviado ao seu e-mail e entre novamente. (Dica: no Supabase dá para desativar a confirmação de e-mail.)');
  }catch(e){showLogin('Falha de conexão com o Supabase.')}
}
function showLocalLogin(msg){
  authGate(`${authHead}<p>Digite sua senha para entrar.</p>
  ${msg?`<div class="autherr">${esc(msg)}</div>`:''}
  <div class="fgroup"><label>Senha</label><input id="lpP" type="password" onkeydown="if(event.key==='Enter')localLogin()"></div>
  <button class="btn btn-p" style="width:100%;padding:13px" onclick="localLogin()">Entrar</button>
  <p style="margin-top:14px;margin-bottom:0;font-size:11.5px">Esqueceu a senha? Restaure um backup em outro dispositivo ou limpe os dados do navegador (isso apaga os dados locais).</p>`);
}
async function localLogin(){
  const h=await hashPass($('#lpP').value);
  if(h===localStorage.getItem('aquagest_pass')){authDone()}
  else showLocalLogin('Senha incorreta.');
}
async function cloudLoad(){
  try{
    const{data}=await sb.from('app_state').select('data').eq('user_id',sbUser.id).maybeSingle();
    if(data&&data.data){DB=data.data;localStorage.setItem(KEY,JSON.stringify(DB))}
    else{await sb.from('app_state').upsert({user_id:sbUser.id,data:DB})}
  }catch(e){toast('Não foi possível carregar da nuvem — usando dados locais','⚠️')}
}
function cloudSave(){
  if(!sb||!sbUser)return;
  clearTimeout(cloudTimer);
  cloudTimer=setTimeout(async()=>{
    try{await sb.from('app_state').upsert({user_id:sbUser.id,data:DB,updated_at:new Date().toISOString()})}
    catch(e){toast('Falha ao sincronizar com a nuvem','⚠️')}
  },1200);
}
async function doLogout(){
  if(sb){try{await sb.auth.signOut()}catch(e){}}
  location.reload();
}

/* ============ BOOT ============ */
loadDB();
document.documentElement.setAttribute('data-theme',DB.settings.theme||'light');
initAuth();
</script>
</body>
</html>
